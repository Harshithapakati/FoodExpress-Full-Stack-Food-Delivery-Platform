name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- 1. Checkout repository ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 2. Setup Node.js ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: ./food-express-backend
        run: npm install

      - name: Run backend tests with coverage
        working-directory: ./food-express-backend
        run: |
          echo "🧪 Running backend tests + coverage..."
          npm test -- --coverage --runInBand || echo "Some tests failed or coverage missing"
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./food-express-backend/coverage/

      - name: Run ESLint (backend)
        working-directory: ./food-express-backend
        run: |
          echo "🔍 Running ESLint for backend..."
          npm run lint || npx eslint . --ext .js,.jsx --max-warnings=10 || true

      - name: Security audit (backend)
        working-directory: ./food-express-backend
        run: |
          echo "🛡️ Running npm security audit..."
          npm audit --audit-level=high || true

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: ./food-express-frontend
        run: npm install

      - name: Run ESLint (frontend)
        working-directory: ./food-express-frontend
        run: |
          echo "🔍 Running ESLint for frontend..."
          npm run lint || npx eslint . --ext .js,.jsx --max-warnings=10 || true

      - name: Build frontend
        working-directory: ./food-express-frontend
        run: |
          echo "🏗️ Building frontend..."
          npm run build --if-present || echo "No build script found"

  # ---------- OPTIONAL DEPLOY STUB (for Sprint 2) ----------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to staging
        run: echo "🚀 Deploying to staging environment..."

      - name: Integration tests placeholder
        run: echo "🧩 Running integration tests..."

      - name: Deploy to production (placeholder)
        run: echo "🌍 Deploying to production environment..."