---
name: 6-Stage CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ========================================
  # STAGE 1: BUILD
  # ========================================
  build:
    name: "Stage 1: Build"
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      # Backend Setup
      - name: ⚙️ Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: food-express-backend/package-lock.json

      - name: 📦 Install backend dependencies
        working-directory: ./food-express-backend
        run: npm ci

      # Frontend Setup
      - name: ⚙️ Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: food-express-frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        working-directory: ./food-express-frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: ./food-express-frontend
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ./food-express-backend/node_modules
            ./food-express-frontend/node_modules
            ./food-express-frontend/dist
          retention-days: 1

  # ========================================
  # STAGE 2: TEST
  # ========================================
  test:
    name: "Stage 2: Test"
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Setup Node for both apps
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci --prefix ./food-express-backend
          npm ci --prefix ./food-express-frontend

      - name: 🧪 Run backend tests
        working-directory: ./food-express-backend
        run: npm test -- --runInBand
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'testsecret' }}
          EMAIL_USER: ${{ secrets.EMAIL_USER || 'test@example.com' }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD || 'testpass' }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID || 'rzp_test_key' }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET || 'test_secret' }}
          RAZORPAY_MOCK: 'true'
          CI: true

      - name: 🧪 Run frontend tests
        working-directory: ./food-express-frontend
        run: npm test -- --runInBand
        env:
          CI: true

  # ========================================
  # STAGE 3: COVERAGE (Test Coverage)
  # ========================================
  coverage:
    name: "Stage 3: Test Coverage"
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci --prefix ./food-express-backend
          npm ci --prefix ./food-express-frontend

      - name: 🧾 Backend test coverage
        working-directory: ./food-express-backend
        run: npm test -- --coverage --runInBand
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'testsecret' }}
          EMAIL_USER: ${{ secrets.EMAIL_USER || 'test@example.com' }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD || 'testpass' }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID || 'rzp_test_key' }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET || 'test_secret' }}
          RAZORPAY_MOCK: 'true'
          CI: true

      - name: 🧾 Frontend test coverage
        working-directory: ./food-express-frontend
        run: npm test -- --coverage --runInBand
        env:
          CI: true
        continue-on-error: true

      - name: 📤 Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./food-express-backend/coverage/
          retention-days: 7

      - name: 📤 Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ./food-express-frontend/coverage/
          retention-days: 7

  # ========================================
  # STAGE 4: LINT (with numeric score)
  # ========================================
  lint:
    name: "Stage 4: Lint (Code Quality Score)"
    needs: coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci --prefix ./food-express-backend
          npm ci --prefix ./food-express-frontend

      - name: 🧮 Backend lint score
        working-directory: ./food-express-backend
        run: |
          echo "Calculating backend lint score..."
          node scripts/lint-score.js || true
        continue-on-error: true

      - name: 🧮 Frontend lint score
        working-directory: ./food-express-frontend
        run: |
          echo "Calculating frontend lint score..."
          node src/lint-score.js || true
        continue-on-error: true

  # ========================================
  # STAGE 5: SECURITY
  # ========================================
  security:
    name: "Stage 5: Security Audit"
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🔒 Audit backend dependencies
        working-directory: ./food-express-backend
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: 🔒 Audit frontend dependencies
        working-directory: ./food-express-frontend
        run: npm audit --audit-level=high --production
        continue-on-error: true

  # ========================================
  # STAGE 6: PACKAGE (DEPLOY)
  # ========================================
  package:
    name: "Stage 6: Package"
    needs: security
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./

      - name: 📥 Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-coverage'
          path: ./coverage-reports
        continue-on-error: true

      - name: 📦 Create deployment package
        run: |
          echo "📦 Creating deployment package..."
          mkdir -p deployment-package
          cp -r food-express-backend deployment-package/ || true
          cp -r food-express-frontend/dist deployment-package/frontend || true
          tar -czf deployment-package.tar.gz deployment-package/
          echo "✅ Deployment package created"

      - name: 📤 Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package.tar.gz
          retention-days: 30

      - name: 🚀 Deployment summary
        run: |
          echo "✅ Ready for deployment!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"