name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ---- Backend Section ----
      - name: Install backend dependencies
        working-directory: ./food-express-backend
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found in backend, skipping npm install"
          fi

      - name: Run backend tests
        working-directory: ./food-express-backend
        run: |
          if [ -f package.json ] && npm list --depth=0 | grep -q jest; then
            npm test
          else
            echo "No Jest tests configured, skipping..."
          fi

      - name: Security audit (backend)
        working-directory: ./food-express-backend
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "No package.json found, skipping security audit"
          fi

      # ---- Frontend Section ----
      - name: Install frontend dependencies
        working-directory: ./food-express-frontend
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found in frontend, skipping npm install"
          fi

      - name: Build frontend
        working-directory: ./food-express-frontend
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          else
            echo "No package.json found, skipping build"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to staging
        run: echo "🚀 Deploying to staging environment..."

      - name: Run integration tests
        run: echo "🧪 Running integration tests..."

      - name: Deploy to production
        run: echo "🌍 Deploying to production environment..."
