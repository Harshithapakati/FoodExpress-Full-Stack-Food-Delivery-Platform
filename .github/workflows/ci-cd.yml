name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ---- Backend Section ----
      - name: Install backend dependencies
        working-directory: ./food-express-backend
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found in backend"
          fi

      - name: Run backend tests
        working-directory: ./food-express-backend
        run: |
          if [ -f package.json ]; then
            npm test || echo "No tests configured"
          else
            echo "No backend found for testing"
          fi

      - name: Security audit (backend)
        working-directory: ./food-express-backend
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "No backend found for security audit"
          fi

      # ---- Frontend Section ----
      - name: Install frontend dependencies
        working-directory: ./food-express-frontend
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found in frontend"
          fi

      - name: Build frontend
        working-directory: ./food-express-frontend
        run: |
          if [ -f package.json ]; then
            npm run build --if-present || echo "No build script found"
          else
            echo "No frontend found for building"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to staging
        run: echo "Deploying to staging environment..."

      - name: Run integration tests
        run: echo "Running integration tests..."

      - name: Deploy to production
        run: echo "Deploying to production environment..."
