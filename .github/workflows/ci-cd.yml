name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- 1. Checkout repository ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 2. Setup Node.js ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            food-express-backend/package-lock.json
            food-express-frontend/package-lock.json

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: ./food-express-backend
        run: npm install

      - name: Run backend tests with coverage
        working-directory: ./food-express-backend
        run: |
          echo "🧪 Running backend tests + coverage..."
          npm test -- --coverage --runInBand || echo "Some tests failed or coverage missing"
        env:
          # Use safe defaults for PRs from forks (secrets unavailable)
          MONGO_URI: ${{ secrets.MONGO_URI || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'testsecret' }}
          EMAIL_USER: ${{ secrets.EMAIL_USER || 'na' }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD || 'na' }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID || 'rzp_test_key' }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET || 'test_secret' }}
          RAZORPAY_MOCK: 'true'

      - name: Enforce backend coverage ≥ 80%
        run: |
          node -e "const s=require('./food-express-backend/coverage/coverage-summary.json').total; const st=s.statements.pct, ln=s.lines.pct; console.log('Backend coverage:', st, ln); if (st < 80 || ln < 80) { console.error('Coverage below threshold (need ≥80% statements & lines)'); process.exit(1); }"

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./food-express-backend/coverage/
          retention-days: 7

      - name: Archive backend test results
        if: always()
        run: |
          mkdir -p ci-artifacts/backend
          cp -r food-express-backend/coverage ci-artifacts/backend/coverage || true
          echo "Backend test & coverage archived"

      - name: Run ESLint (backend)
        working-directory: ./food-express-backend
        run: |
          echo "🔍 Running ESLint for backend..."
          npm run lint || npx eslint . --ext .js,.jsx --max-warnings=10 || true

      - name: Security audit (backend)
        working-directory: ./food-express-backend
        run: |
          echo "🛡️ Running npm security audit..."
          npm audit --audit-level=high || true

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: ./food-express-frontend
        run: npm install

      - name: Run frontend tests with coverage
        working-directory: ./food-express-frontend
        run: |
          echo "🧪 Running frontend tests + coverage (Jest + RTL)..."
          npm test -- --coverage --runInBand || echo "Frontend tests failed or coverage below threshold"
        env:
          CI: true

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ./food-express-frontend/coverage/
          retention-days: 7

      - name: Archive frontend test results
        if: always()
        run: |
          mkdir -p ci-artifacts/frontend
          cp -r food-express-frontend/coverage ci-artifacts/frontend/coverage || true
          echo "Frontend test & coverage archived"

      - name: Run ESLint (frontend)
        working-directory: ./food-express-frontend
        run: |
          echo "🔍 Running ESLint for frontend..."
          npm run lint || npx eslint . --ext .js,.jsx --max-warnings=10 || true

      - name: Build frontend
        working-directory: ./food-express-frontend
        run: |
          echo "🏗️ Building frontend..."
          npm run build --if-present || echo "No build script found"

      - name: Compress combined CI artifacts
        if: always()
        run: |
          mkdir -p ci-artifacts/meta
          echo "Commit SHA: $GITHUB_SHA" > ci-artifacts/meta/build-info.txt
          zip -r ci-artifacts.zip ci-artifacts || echo "Zip creation warning"

      - name: Upload combined CI artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-bundle
          path: ci-artifacts.zip

      - name: Failure diagnostics
        if: failure()
        run: |
          node -v
          npm -v
          du -sh food-express-backend || true
          du -sh food-express-frontend || true
          cat food-express-backend/coverage/coverage-summary.json || true
          cat food-express-frontend/coverage/coverage-summary.json || true

  # ---------- OPTIONAL DEPLOY STUB (for Sprint 2) ----------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to staging
        run: echo "🚀 Deploying to staging environment..."

      - name: Integration tests placeholder
        run: echo "🧩 Running integration tests..."

      - name: Deploy to production (placeholder)
        run: echo "🌍 Deploying to production environment..."